<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="./assets/images/favicon-32x32.png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Product preview card component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div class="container">
      <div class="img">
        <img class="desktop" src="./assets/images/image-product-desktop.jpg" alt="A bottle of Chanel Gabrielle Eau de Parfum sitting on a table.">
        <img class="mobile" src="./assets/images/image-product-mobile.jpg" alt="A bottle of Chanel Gabrielle Eau de Parfum sitting on a table.">
      </div>
      <div class="content">
        <p class="product">Perfume</p>
        <h1>Gabrielle Essence Eau De Parfum</h1>
        <p>A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>
        <div class="price">
          <p class="current-price">$149.99</p>
          <p class="original-price">$169.99</p>
        </div>
        <button type="button"> <img src="./assets/images/icon-cart.svg" alt="">Add to Cart</button>
      </div>
    </div>
  </main>
</body>
</html>
